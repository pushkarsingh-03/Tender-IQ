// ─── UTILS ────────────────────────────────────────────────────────────────────
function fmtCur(v){const n=Number(v);if(!n||isNaN(n))return"—";if(n>=10000000)return"₹"+(n/10000000).toFixed(2)+" Cr";if(n>=100000)return"₹"+(n/100000).toFixed(2)+"L";return"₹"+n.toLocaleString("en-IN");}
function fmtDate(d){if(!d||d==="N/A"||d==="")return"—";try{const dt=new Date(d);if(isNaN(dt))return d;return dt.toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"});}catch{return d;}}
function nextId(){return"GEM-"+String(tenders.length+1).padStart(3,"0");}

function showNotif(msg,type="ok"){
  const el=document.getElementById("notif");
  if(!el)return;
  el.textContent=(type==="err"?"✗ ":"✓ ")+msg;
  el.style.display="block";
  el.style.background=type==="err"?"#FCEBEB":"#EAF3DE";
  el.style.color=type==="err"?"#A32D2D":"#3B6D11";
  el.style.border="1px solid "+(type==="err"?"#F09595":"#97C459");
  setTimeout(()=>{el.style.display="none";},3500);
}

function statusBadge(s,sm){const c=SC[s]||{bg:"#F5F4F0",tx:"#444",br:"#ccc"};return`<span class="badge" style="background:${c.bg};color:${c.tx};border:1px solid ${c.br};font-size:${sm?10:11}px">${s}</span>`;}
function wonBadge(w){const map={"WON":{bg:"#EAF3DE",tx:"#3B6D11"},"Lost":{bg:"#FCEBEB",tx:"#A32D2D"},"Pending":{bg:"#FAEEDA",tx:"#854F0B"},"Cancelled":{bg:"#F5F4F0",tx:"#888"}};const c=map[w]||map["Pending"];return`<span class="badge" style="background:${c.bg};color:${c.tx};font-size:10px">${w||"Pending"}</span>`;}
function metricCard(label,value,color){return`<div class="metric"><label>${label}</label><div class="val" style="color:${color||"var(--primary)"}">${value}</div></div>`;}

// ─── READ ALL FORM FIELDS LIVE FROM DOM ───────────────────────────────────────
// This is the KEY fix — we read values directly from DOM inputs, not from JS object
// so we never have stale state issues
function readNewFormFromDOM(){
  const fields=["gemId","title","organization","department","ministry","tenderType","quantity","submissionDate","endDate","bidAmount","l1Price","l1Bidder","contractNo","contractDate","orderValue","contractStatus","consigneeAddress","officeName","evaluationMethod","remarks"];
  const form={};
  fields.forEach(f=>{
    const el=document.getElementById("nf_"+f);
    form[f]=el?el.value:"";
  });
  const statusEl=document.getElementById("nf_status");
  const wonLostEl=document.getElementById("nf_wonLost");
  form.status=statusEl?statusEl.value:"Submitted";
  form.wonLost=wonLostEl?wonLostEl.value:"";
  return form;
}

// ─── FILTERS ──────────────────────────────────────────────────────────────────
function getFiltered(){
  return tenders.filter(t=>{
    const q=searchQ.toLowerCase();
    const mq=!q||(t.title||"").toLowerCase().includes(q)||(t.gemId||"").toLowerCase().includes(q)||(t.department||"").toLowerCase().includes(q)||(t.organization||"").toLowerCase().includes(q)||(t.l1Bidder||"").toLowerCase().includes(q);
    const ms=filterStatus==="All"||t.status===filterStatus;
    let mt=true;
    if(filterTab==="active")mt=!["Closed","Cancelled","L2/L3","Technically Rejected"].includes(t.status);
    if(filterTab==="won")mt=t.wonLost==="WON"||["L1","Awarded","Work Order Issued"].includes(t.status);
    if(filterTab==="lost")mt=t.wonLost==="Lost"||["L2/L3","Technically Rejected"].includes(t.status);
    if(filterTab==="pending")mt=!["WON","Lost","Cancelled"].includes(t.wonLost)&&t.wonLost!=="CANCELLED";
    return mq&&ms&&mt;
  });
}

function renderDashboard(){
  const won=tenders.filter(t=>t.wonLost==="WON").length;

  const pending=tenders.filter(t=>!["WON","Lost","Cancelled"].includes(t.wonLost)&&t.wonLost!=="CANCELLED").length;
  const totalBid=tenders.reduce((s,t)=>s+(Number(t.bidAmount)||0),0);
  const totalWon=tenders.filter(t=>t.wonLost==="WON").reduce((s,t)=>s+(Number(t.orderValue||t.bidAmount)||0),0);
  const winRate=tenders.length?Math.round((won/tenders.length)*100):0;

  const dist=Object.entries(SC).map(([s,c])=>{const cnt=tenders.filter(t=>t.status===s).length;if(!cnt)return"";const w=Math.max((cnt/tenders.length)*150,8);return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px"><div style="width:${w}px;height:5px;background:${c.br};border-radius:3px;flex-shrink:0"></div><span style="font-size:12px;color:var(--muted)">${s}</span><span style="font-size:12px;font-weight:600;margin-left:auto">${cnt}</span></div>`;}).join("");

  const topComp={};
  tenders.filter(t=>t.l1Bidder&&t.wonLost==="Lost").forEach(t=>{const n=(t.l1Bidder||"").split("(")[0].trim();if(n)topComp[n]=(topComp[n]||0)+1;});
  const compHtml=Object.entries(topComp).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([n,c])=>`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border)"><span style="font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px">${n}</span><span style="font-size:12px;font-weight:600;color:var(--red);flex-shrink:0;margin-left:8px">${c}x</span></div>`).join("");

  const recent=tenders.slice(0,6).map(t=>`<div onclick="selectTender('${t.id}')" style="padding:7px 0;border-bottom:1px solid var(--border);cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px"><div style="min-width:0"><p style="margin:0;font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.title}</p><p style="margin:2px 0 0;font-size:11px;color:var(--muted)">${t.gemId}</p></div>${wonBadge(t.wonLost||"Pending")}</div>`).join("");

  return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
    <div><h1 style="font-size:20px;font-weight:700">Dashboard</h1><p style="color:var(--muted);font-size:13px;margin-top:2px">${tenders.length} tenders tracked · Vardhman Hydraulic Hoses</p></div>

    </div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:12px">
    ${metricCard("Total Tenders",tenders.length)}
    ${metricCard("WON",won,"var(--green)")}
    ${metricCard("Lost",lost,"var(--red)")}
    ${metricCard("Pending",pending,"var(--amber)")}
    ${metricCard("Win Rate",winRate+"%",winRate>=20?"var(--green)":"var(--amber)")}
  </div>
  <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px">
    ${metricCard("Total Bid Value",fmtCur(totalBid),"var(--blue)")}
    ${metricCard("Total Won Value",fmtCur(totalWon),"var(--green)")}
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px">

    <div class="card"><p style="font-size:13px;font-weight:600;margin-bottom:12px">Recent Tenders</p>${recent}</div>
  </div>`;
}

// ─── CORE FIXED: doAddTender reads DOM directly — no stale state ──────────────
function doAddTender(){
  // Read all values fresh from DOM at click time
  const form=readNewFormFromDOM();

  // Validation
  if(!form.gemId.trim()&&!form.title.trim()){
    showNotif("Please fill in GEM Tender ID or Product Description","err");
    document.getElementById("nf_gemId")?.focus();
    return;
  }

  // Check duplicate GEM ID
  if(form.gemId.trim()){
    const dup=tenders.find(t=>t.gemId.trim()===form.gemId.trim());
    if(dup){
      showNotif("Duplicate: "+form.gemId+" already in database ("+dup.id+")","err");
      return;
    }
  }

  const now=new Date().toISOString().split("T")[0];
  const t={
    id:nextId(),
    gemId:form.gemId.trim(),
    refNumber:form.gemId.trim(),
    title:form.title.trim(),
    organization:form.organization.trim(),
    department:form.department.trim(),
    ministry:form.ministry.trim(),
    tenderType:(form.tenderType||"BID").trim(),
    quantity:Number(form.quantity)||0,
    submissionDate:form.submissionDate,
    endDate:form.endDate,
    bidAmount:Number(String(form.bidAmount).replace(/[₹,\s]/g,""))||0,
    l1Price:Number(String(form.l1Price).replace(/[₹,\s]/g,""))||0,
    l1Bidder:form.l1Bidder.trim(),
    contractNo:form.contractNo.trim(),
    contractDate:form.contractDate,
    orderValue:Number(String(form.orderValue).replace(/[₹,\s]/g,""))||0,
    contractStatus:form.contractStatus.trim(),
    consigneeAddress:form.consigneeAddress.trim(),
    officeName:form.officeName.trim(),
    evaluationMethod:form.evaluationMethod.trim(),
    wonLost:form.wonLost||"Pending",
    status:form.status||"Submitted",
    bidStatus:form.status||"Submitted",
    remarks:form.remarks.trim(),
    tenderValue:Number(String(form.orderValue).replace(/[₹,\s]/g,""))||0,
    emdAmount:0,
    location:form.consigneeAddress.slice(0,60),
    category:form.ministry,
    riskLevel:"Low",
    deadlines:{technical:"",financial:form.endDate||""},
    contact:"",
    pendingAction:form.wonLost==="WON"?"Follow up on contract":"Monitor evaluation status",
    latestUpdate:form.remarks||form.status||"Added manually",
    aiSummary:form.bidAmount?"Our bid: ₹"+Number(form.bidAmount).toLocaleString("en-IN"):"",
    documents:[],
    timeline:[{date:now,event:"Tender added manually",type:"filed"}],
    _sno:tenders.length+1,
  };

  tenders=[t,...tenders];
  saveLocal();
  showNotif((t.gemId||t.title)+" added to database ✓");
  // Reset addMode but don't clear to tenders immediately so user sees the success
  goView("tenders");
}

// ─── SMART PASTE ──────────────────────────────────────────────────────────────
async function runPasteParse(){
  const el=document.getElementById("pasteBox");
  if(el)pasteText=el.value;
  if(!pasteText.trim()){showNotif("Paste some tender info first","err");return;}
  pasteProcessing=true;render();
  const res=await callAI(`You are a GeM tender data extractor for Vardhman Hydraulic Hoses Pvt Ltd, India.
Extract all tender fields from the pasted text. Text may be messy or partial — extract whatever is available.
Return ONLY valid JSON with these exact keys (use null for missing fields):
{"gemId":"GEM/20XX/X/XXXXXXX","title":"product description","organization":"buyers name","department":"buyers dept","ministry":"ministry name","tenderType":"BID or RA","quantity":number_or_null,"submissionDate":"DD-MM-YYYY","endDate":"DD-MM-YYYY","bidAmount":number_or_null,"l1Price":number_or_null,"l1Bidder":"L1 company name or null","contractNo":"GEMC-XXXX or null","contractDate":"date or null","orderValue":number_or_null,"contractStatus":"In Progress/Completed/Contract Received or null","consigneeAddress":"delivery address or null","officeName":"office name or null","evaluationMethod":"Total value wise or Item wise or null","wonLost":"WON or Lost or Pending or Cancelled","status":"Submitted or Under Review or Technical Bid Opened or Technically Qualified or Technically Rejected or Financial Bid Opened or L1 or L2/L3 or Awarded or Work Order Issued or Closed or Cancelled","remarks":"concise 1-2 line summary of this tender"}

Pasted text:
${pasteText}`);
  pasteProcessing=false;
  if(res&&(res.gemId||res.title)){parsedPreview=res;showNotif("Parsed successfully — review and confirm");}
  else showNotif("Could not parse — add more detail and retry","err");
  render();
}

function confirmParsed(){
  if(!parsedPreview)return;
  const p=parsedPreview;
  if(p.gemId&&tenders.find(t=>t.gemId.trim()===String(p.gemId).trim())){
    showNotif("Duplicate: "+p.gemId+" already exists in database","err");return;
  }
  const now=new Date().toISOString().split("T")[0];
  const t={
    id:nextId(),
    gemId:p.gemId||"",
    refNumber:p.gemId||"",
    title:p.title||"",
    organization:p.organization||"",
    department:p.department||"",
    ministry:p.ministry||"",
    tenderType:p.tenderType||"BID",
    quantity:Number(p.quantity)||0,
    submissionDate:p.submissionDate||"",
    endDate:p.endDate||"",
    bidAmount:Number(p.bidAmount)||0,
    l1Price:Number(p.l1Price)||0,
    l1Bidder:p.l1Bidder||"",
    contractNo:p.contractNo||"",
    contractDate:p.contractDate||"",
    orderValue:Number(p.orderValue)||0,
    contractStatus:p.contractStatus||"",
    consigneeAddress:p.consigneeAddress||"",
    officeName:p.officeName||"",
    evaluationMethod:p.evaluationMethod||"",
    wonLost:p.wonLost||"Pending",
    status:p.status||"Submitted",
    bidStatus:p.status||"",
    remarks:p.remarks||pasteText.slice(0,200),
    tenderValue:Number(p.orderValue)||0,
    emdAmount:0,
    location:(p.consigneeAddress||"").slice(0,60),
    category:p.ministry||"",
    riskLevel:"Low",
    deadlines:{technical:"",financial:p.endDate||""},
    contact:"",
    pendingAction:p.wonLost==="WON"?"Follow up on contract":"Monitor status",
    latestUpdate:p.remarks||p.status||"Added via Smart Paste",
    aiSummary:p.remarks||"",
    documents:[],
    timeline:[{date:now,event:"Tender added via Smart Paste",type:"filed"}],
    _sno:tenders.length+1,
  };
  tenders=[t,...tenders];
  saveLocal();
  showNotif((p.gemId||p.title||"Tender")+" saved to database ✓");
  pasteText="";parsedPreview=null;addMode="paste";
  goView("tenders");
}

// ─── AI API ───────────────────────────────────────────────────────────────────
async function callAI(prompt){
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
  const d=await r.json();
  const raw=d.content?.find(b=>b.type==="text")?.text||"{}";
  try{return JSON.parse(raw.replace(/```json|```/g,"").trim());}catch{return null;}
}

async function processManual(){
  if(!manualText.trim()||aiProcessing)return;
  aiProcessing=true;render();
  const list=tenders.slice(0,60).map(t=>`${t.gemId}: ${t.title} | Status: ${t.wonLost}`).join("\n");
  const res=await callAI(`You are a GeM tender tracker for Vardhman Hydraulic Hoses.
Match this update to the correct tender. Return ONLY valid JSON, no markdown.
Update: "${manualText}"
Our Tenders:\n${list}
Valid statuses: ${STATUSES.join(", ")}
Return: {"matchedGemId":"GEM/20XX/X/XXXXXXX or null","confidence":"high/medium/low","updateType":"L1 Result/L2 Result/Technical Qualification/Financial Opening/Contract/Other","newStatus":"exact status or null","wonLost":"WON/Lost/Pending/Cancelled or null","l1Price":number_or_null,"l1Bidder":"name or null","contractNo":"number or null","orderValue":number_or_null,"summary":"one line summary","urgentAction":"action needed or null","remarks":"remark text"}`);
  aiProcessing=false;
  if(res){const match=tenders.find(t=>t.gemId===res.matchedGemId);if(match)res.matchedTenderId=match.id;aiResult=res;pendingUpdate={...res};}
  else showNotif("AI processing failed","err");
  render();
}

async function processEmail(){
  if(!emailText.trim()||aiProcessing)return;
  aiProcessing=true;render();
  const list=tenders.slice(0,60).map(t=>`${t.gemId}: ${t.title} | ${t.department}`).join("\n");
  const res=await callAI(`You are a GeM tender tracker for Vardhman Hydraulic Hoses.
Analyze this GeM email. Return ONLY valid JSON, no markdown.
Email:\n${emailText}
Our Tenders:\n${list}
Return: {"matchedGemId":"GEM/20XX/X/XXXXXXX or null","confidence":"high/medium/low","updateType":"Corrigendum/Technical Opening/Financial Opening/L1 Notification/LOA/Contract Generated/Rejection/Other","newStatus":"exact status or null","wonLost":"WON/Lost/Pending/Cancelled or null","l1Price":number_or_null,"l1Bidder":"name or null","contractNo":"number or null","orderValue":number_or_null,"summary":"one line summary","urgentAction":"action needed or null","remarks":"remark text"}`);
  aiProcessing=false;
  if(res){const match=tenders.find(t=>t.gemId===res.matchedGemId);if(match)res.matchedTenderId=match.id;aiResult=res;pendingUpdate={...res};}
  else showNotif("Email analysis failed","err");
  render();
}

function confirmUpdate(){
  if(!pendingUpdate?.matchedTenderId&&!pendingUpdate?.matchedGemId){showNotif("No tender matched — cannot apply","err");return;}
  const now=new Date().toISOString().split("T")[0];
  tenders=tenders.map(t=>{
    const match=t.id===pendingUpdate.matchedTenderId||t.gemId===pendingUpdate.matchedGemId;
    if(!match)return t;
    const u={...t};
    if(pendingUpdate.newStatus)u.status=pendingUpdate.newStatus;
    if(pendingUpdate.wonLost)u.wonLost=pendingUpdate.wonLost;
    if(pendingUpdate.l1Price)u.l1Price=pendingUpdate.l1Price;
    if(pendingUpdate.l1Bidder)u.l1Bidder=pendingUpdate.l1Bidder;
    if(pendingUpdate.contractNo)u.contractNo=pendingUpdate.contractNo;
    if(pendingUpdate.contractDate)u.contractDate=pendingUpdate.contractDate;
    if(pendingUpdate.orderValue)u.orderValue=pendingUpdate.orderValue;
    if(pendingUpdate.contractStatus)u.contractStatus=pendingUpdate.contractStatus;
    if(pendingUpdate.remarks)u.remarks=(u.remarks||"")+" | "+pendingUpdate.remarks;
    if(pendingUpdate.summary)u.latestUpdate=pendingUpdate.summary;
    u.timeline=[...(t.timeline||[]),{date:now,event:pendingUpdate.summary||"Status updated",type:"update"}];
    return u;
  });
  saveLocal();showNotif("Tender updated successfully");
  aiResult=null;pendingUpdate=null;manualText="";emailText="";render();
}

// ─── CRUD ─────────────────────────────────────────────────────────────────────
function deleteTender(id){
  if(!confirm("Delete this tender from the tracker?"))return;
  tenders=tenders.filter(t=>t.id!==id);saveLocal();showNotif("Tender removed");goView("tenders");
}
function updateTenderStatus(id,status){
  const now=new Date().toISOString().split("T")[0];
  tenders=tenders.map(t=>t.id!==id?t:{...t,status,timeline:[...(t.timeline||[]),{date:now,event:"Status → "+status,type:"update"}]});
  saveLocal();render();
}

// ─── EXCEL EXPORT ─────────────────────────────────────────────────────────────
function exportExcel(){
  try{
    const wb=XLSX.utils.book_new();
    const headers=["S.No.","Tender ID","Tender Type","Buyers Name","Buyers Department","Ministry","Product Description","Quantity","Tender WON/LOST","Bid Status","Start Date","End Date","Remarks","Our Bid Price (₹)","L1 Bid Price (₹)","L1 Bidder Name","Consignee Address","Contract No.","Contract Date","Order Value (₹)","Contract Status","Office Name","Evaluation Method"];
    const rows=tenders.map((t,i)=>[i+1,t.gemId||"",t.tenderType||"BID",t.organization||"",t.department||"",t.ministry||"",t.title||"",t.quantity||"",t.wonLost||"",t.bidStatus||t.status||"",t.submissionDate||"",t.endDate||"",t.remarks||"",t.bidAmount||"",t.l1Price||"",t.l1Bidder||"",t.consigneeAddress||"",t.contractNo||"",t.contractDate||"",t.orderValue||"",t.contractStatus||"",t.officeName||"",t.evaluationMethod||""]);
    const ws=XLSX.utils.aoa_to_sheet([headers,...rows]);
    ws["!cols"]=[5,30,8,30,25,35,50,8,8,25,12,12,80,15,15,40,50,25,12,15,20,20,20].map(w=>({wch:w}));
    XLSX.utils.book_append_sheet(wb,ws,"Tender Database");
    const won=tenders.filter(t=>t.wonLost==="WON");
    if(won.length){
      const wh=["S.No.","Tender ID","Buyer","Product","Qty","Our Bid (₹)","Contract No.","Contract Date","Order Value (₹)","Status"];
      const wr=won.map((t,i)=>[i+1,t.gemId,t.organization,t.title,t.quantity,t.bidAmount,t.contractNo,t.contractDate,t.orderValue,t.contractStatus]);
      XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([wh,...wr]),"Won Orders");
    }
    XLSX.writeFile(wb,"Vardhman_Tender_File_"+new Date().toISOString().split("T")[0]+".xlsx");
    showNotif("Excel exported successfully");
  }catch(e){showNotif("Export failed: "+e.message,"err");}
}

// ─── EXCEL IMPORT ─────────────────────────────────────────────────────────────
function importExcel(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=(e)=>{
    try{
      const wb=XLSX.read(e.target.result,{type:"binary"});
      const ws=wb.Sheets["Tender Database"];
      if(!ws){showNotif("Sheet 'Tender Database' not found","err");return;}
      const rows=XLSX.utils.sheet_to_json(ws,{header:1});
      const headers=rows[0];
      const col=(name)=>headers.indexOf(name);
      let added=0,updated=0;
      rows.slice(1).forEach((row,i)=>{
        const gemId=String(row[col("Tender ID")]||"").trim();
        if(!gemId)return;
        const d={gemId,refNumber:gemId,tenderType:String(row[col("Tender Type")]||"BID").trim(),organization:String(row[col("Buyers Name")]||"").trim(),department:String(row[col("Buyers Department")]||"").trim(),ministry:String(row[col("Ministry")]||"").trim(),title:String(row[col("Product Description")]||"").trim(),quantity:Number(row[col("Quantity")])||0,wonLost:String(row[col("Tender WON/LOST")]||"").trim(),bidStatus:String(row[col("Bid Status")]||"").trim(),submissionDate:String(row[col("Start Date")]||"").trim(),endDate:String(row[col("End Date")]||"").trim(),remarks:String(row[col("Remarks")]||"").trim(),bidAmount:Number(String(row[col("Our Bid Price (₹)")]||"").replace(/[₹,\s]/g,""))||0,l1Price:Number(String(row[col("L1 Bid Price (₹)")]||"").replace(/[₹,\s]/g,""))||0,l1Bidder:String(row[col("L1 Bidder Name")]||"").trim(),consigneeAddress:String(row[col("Consignee Address")]||"").trim(),contractNo:String(row[col("Contract No.")]||"").trim(),contractDate:String(row[col("Contract Date")]||"").trim(),orderValue:Number(String(row[col("Order Value (₹)")]||"").replace(/[₹,\s]/g,""))||0,contractStatus:String(row[col("Contract Status")]||"").trim(),officeName:String(row[col("Office Name")]||"").trim(),evaluationMethod:String(row[col("Evaluation Method")]||"").trim()};
        const ex=tenders.find(t=>t.gemId===gemId);
        if(ex){Object.assign(ex,d);updated++;}
        else{tenders.push({...d,id:"GEM-"+String(tenders.length+1).padStart(3,"0"),status:"Submitted",tenderValue:d.orderValue,emdAmount:0,location:d.consigneeAddress.slice(0,60),category:d.ministry,riskLevel:"Low",deadlines:{technical:"",financial:d.endDate},contact:"",pendingAction:"",latestUpdate:d.bidStatus,documents:[],aiSummary:"",timeline:[{date:new Date().toISOString().split("T")[0],event:"Imported from Excel",type:"filed"}],_sno:i+1});added++;}
      });
      saveLocal();showNotif("Import complete: "+added+" new, "+updated+" updated");render();
    }catch(e){showNotif("Import failed: "+e.message,"err");}
  };
  reader.readAsBinaryString(file);input.value="";
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function renderContent(){
  if(view==="dashboard")return renderDashboard();
  if(view==="tenders")return renderTenderList();
  if(view==="detail")return renderDetail();
  if(view==="updates")return renderUpdates();
  if(view==="new")return renderNewTender();
  return"";
}

function render(){
  const won=tenders.filter(t=>t.wonLost==="WON").length;
  const winRate=tenders.length?Math.round((won/tenders.length)*100):0;
  const navItems=[{id:"dashboard",label:"📊 Dashboard"},{id:"tenders",label:"📋 All Tenders"},{id:"updates",label:"🤖 AI Updates"},{id:"new",label:"＋ Add Tender"}];
  const navHtml=navItems.map(n=>`<button onclick="goView('${n.id}')" style="display:flex;align-items:center;width:100%;padding:8px 12px;border-radius:7px;border:none;background:${view===n.id?"#E8E6E0":"transparent"};color:${view===n.id?"var(--primary)":"var(--muted)"};cursor:pointer;font-size:13px;font-weight:${view===n.id?600:400};text-align:left;margin-bottom:2px">${n.label}</button>`).join("");
  document.getElementById("app").innerHTML=`
    <div style="width:196px;background:#EDEBE5;border-right:1px solid var(--border);padding:1.25rem 0;flex-shrink:0;display:flex;flex-direction:column;min-height:100vh">
      <div style="padding:0 1.25rem 1rem;border-bottom:1px solid var(--border);margin-bottom:8px">
        <p style="font-size:15px;font-weight:700;margin:0">TenderIQ</p>
        <p style="font-size:10px;color:var(--muted);margin:2px 0 0">Vardhman Hydraulic Hoses</p>
      </div>
      <nav style="flex:1;padding:0 0.5rem">${navHtml}</nav>
      <div style="padding:1rem 1.25rem;border-top:1px solid var(--border)">
        <p style="font-size:11px;color:var(--muted);margin:0">${tenders.length} tenders · Win rate: ${winRate}%</p>
        <button onclick="resetToDefault()" style="margin-top:8px;width:100%;padding:5px;border:1px solid var(--border);background:transparent;border-radius:5px;font-size:10px;color:var(--muted);cursor:pointer">↺ Reset to default data</button>
      </div>
    </div>
    <div style="flex:1;padding:1.5rem 2rem;overflow-y:auto;max-height:100vh;min-width:0">
      <div id="content">${renderContent()}</div>
    </div>`;
}

// ─── GLOBAL HANDLERS ──────────────────────────────────────────────────────────

window.setAddMode=(m)=>{addMode=m;render();};
window.selectTender=(id)=>{selectedId=id;view="detail";render();};
window.setTab=(t)=>{filterTab=t;render();};
window.setSearch=(v)=>{searchQ=v;render();};
window.setFilterStatus=(v)=>{filterStatus=v;render();};
window.doAddTender=()=>doAddTender();
window.deleteTender=(id)=>deleteTender(id);
window.updateTenderStatus=(id,s)=>updateTenderStatus(id,s);
window.doManual=()=>{const el=document.getElementById("mtext");if(el)manualText=el.value;processManual();};
window.doEmail=()=>{const el=document.getElementById("etext");if(el)emailText=el.value;processEmail();};
window.confirmUpdate=()=>confirmUpdate();
window.discardAI=()=>{aiResult=null;pendingUpdate=null;render();};

window.confirmParsed=()=>confirmParsed();
window.clearPaste=()=>{pasteText="";parsedPreview=null;render();};
window.clearParsed=()=>{parsedPreview=null;render();};
window.exportExcel=()=>exportExcel();
window.importExcel=(input)=>importExcel(input);
window.resetToDefault=()=>{if(!confirm("Reset to default data? All local changes lost."))return;localStorage.removeItem("tiq_v4");tenders=JSON.parse(JSON.stringify(EXCEL_DATA));showNotif("Reset to default");render();};

initData();
render();
</script>
